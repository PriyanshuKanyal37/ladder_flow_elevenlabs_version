name: Mirror to company repo

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

concurrency:
  group: mirror-to-company
  cancel-in-progress: false

jobs:
  mirror:
    if: github.repository == 'PriyanshuKanyal37/ladder_flow_elevenlabs_version'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main and tags to company repo
        env:
          COMPANY_REPO_TOKEN: ${{ secrets.COMPANY_REPO_TOKEN }}
        run: |
          git remote add company "https://x-access-token:${COMPANY_REPO_TOKEN}@github.com/digitalmasterykit-rgb/ladder_flow_elevenlabs_version.git"
          git push company main --force
          git push company --tags --force
